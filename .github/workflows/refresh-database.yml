name: Refresh Database

# Scheduled times are AEST (UTC+10).
# Note: GitHub Actions cron is UTC. During AEDT (UTC+11, Oct–Apr) these will
# fire one hour later local time than labelled.
#
# Saturday 21:00 AEST  → Saturday 11:00 UTC
# Sunday   18:00 AEST  → Sunday   08:00 UTC
#
# Required GitHub secret:
#   NETBALL_STATS_DATABASE_URL  — PostgreSQL connection URL, e.g.:
#     postgresql://user:password@host:5432/dbname?sslmode=require

on:
  schedule:
    - cron: "0 11 * * 6"   # Saturday 21:00 AEST
    - cron: "0 8 * * 0"    # Sunday 18:00 AEST
  workflow_dispatch:        # Allow manual runs from GitHub UI

permissions:
  contents: read

jobs:
  refresh:
    name: Rebuild stats database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libpq-dev libcurl4-openssl-dev libssl-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.4-${{ hashFiles('.github/workflows/refresh-database.yml') }}
          restore-keys: ${{ runner.os }}-r-4.4-

      - name: Install R packages
        run: |
          Rscript -e "
            cran <- c('DBI', 'dplyr', 'purrr', 'httr', 'jsonlite', 'RPostgres', 'RSQLite', 'remotes')
            missing <- cran[!cran %in% installed.packages()[, 'Package']]
            if (length(missing)) {
              install.packages(missing, repos = 'https://cloud.r-project.org')
            }
            if (!'superNetballR' %in% installed.packages()[, 'Package']) {
              remotes::install_github(
                'craigmoyle/superNetballR_updated@9898d3a03332a7402b1c3abb50493c50ac07d549',
                upgrade = 'never'
              )
            }
          "

      - name: Refresh database
        env:
          NETBALL_STATS_DATABASE_URL: ${{ secrets.NETBALL_STATS_DATABASE_URL }}
          NETBALL_STATS_DB_STATEMENT_TIMEOUT_MS: "0"
        run: Rscript scripts/build_database.R
