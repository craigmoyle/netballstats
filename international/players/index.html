<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="application-name" content="Statsball International">
    <script src="/assets/theme.js"></script>
    <title>Players · Statsball International</title>
    <meta name="description" content="Browse Australian Diamonds and international netball players with career statistics.">
    <meta property="og:title" content="Players · Statsball International">
    <meta property="og:description" content="Browse Australian Diamonds and international netball players with career statistics.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/share-international.png">
    <meta property="og:image:alt" content="Statsball International — netball archive">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Players · Statsball International">
    <meta name="twitter:description" content="Browse Australian Diamonds and international netball players with career statistics.">
    <meta name="twitter:image" content="/assets/share-international.png">
    <link rel="preload" href="/assets/fonts/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/teko-600-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/config.js"></script>
    <script defer src="/assets/telemetry.js"></script>
    <script defer src="/assets/international-players.js"></script>
  </head>
  <body class="players-page">
    <a href="#main-content" class="skip-link">Skip to content</a>

    <header class="page-shell hero-shell reveal">
        <nav class="page-nav" aria-label="International netball archive">
          <div class="page-nav__mode" role="group" aria-label="Switch archive">
            <a class="page-nav__mode-link" href="/">Super Netball</a>
            <a class="page-nav__mode-link page-nav__mode-link--active" href="/international/">International</a>
          </div>
          <span class="page-nav__divider" aria-hidden="true"></span>
          <a class="page-nav__link" href="/international/">Archive</a>
          <a class="page-nav__link" href="/international/players/">Players</a>
          <a class="page-nav__link" href="/international/query/">Ask the stats</a>
          <a class="page-nav__link" href="/international/compare/">Compare</a>
          <span class="page-nav__divider" aria-hidden="true"></span>
          <a class="page-nav__link" href="/ideas/">Ideas</a>
          <a class="page-nav__link" href="/changelog/">Changelog</a>
          <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Current theme dark. Switch to light theme"><span class="theme-toggle__kicker">Reading mode</span><span class="theme-toggle__value">Night desk</span></button>
        </nav>

      <section class="hero-panel">
        <div class="hero-copy">
          <p class="eyebrow">Player profiles</p>
          <h1>International players</h1>
        </div>

        <aside class="hero-aside" aria-label="Player directory status">
          <div class="hero-aside__card">
            <span class="hero-aside__label">Directory size</span>
            <strong id="int-directory-total">–</strong>
            <p id="int-directory-summary">Loading player records.</p>
          </div>
        </aside>
      </section>
    </header>

    <main id="main-content" class="page-shell page-main">
      <section class="panel reveal">
        <div id="players-status" class="status-banner" role="status" aria-live="polite" hidden></div>
        <div class="panel__heading panel__heading--split">
          <div>
            <p class="panel__eyebrow">Directory</p>
            <h2>All players</h2>
          </div>
          <p id="players-results-meta" class="directory-results-meta" aria-live="polite" aria-atomic="true">Loading players…</p>
        </div>

        <div class="field directory-search">
          <label for="players-search">Find a player</label>
          <input type="search" id="players-search" placeholder="Search by player name" autocomplete="off">
        </div>
      </section>

      <section class="panel reveal">
        <div id="int-directory-grid" class="directory-grid"></div>
        <p id="players-empty" class="panel__lead" hidden>No players found for this search.</p>
      </section>
    </main>
  </body>
</html>
