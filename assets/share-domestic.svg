<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Statsball</title>
  <desc id="desc">Super Netball and ANZ Championship archive</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @font-face {
        font-family: 'Fraunces';
        src: url('fonts/fraunces-latin.woff2') format('woff2');
        font-weight: 400 700;
        font-style: normal;
      }
      @font-face {
        font-family: 'Teko';
        src: url('fonts/teko-600-latin.woff2') format('woff2');
        font-weight: 600;
        font-style: normal;
      }
    ]]></style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171411"/>
      <stop offset="100%" stop-color="#221c18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#79d8d0"/>
      <stop offset="55%" stop-color="#f0c67e"/>
      <stop offset="100%" stop-color="#79d8d0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="72" width="56" height="4" fill="url(#accent)"/>
  <text x="72" y="210" fill="#f5efe6" font-family="Teko, sans-serif" font-size="92" font-weight="600">Statsball</text>
  <text x="72" y="286" fill="#c8bfb3" font-family="Teko, sans-serif" font-size="34" font-weight="600" letter-spacing="0.04em">SUPER NETBALL &amp; ANZ ARCHIVE</text>
  <text x="72" y="360" fill="#9a9084" font-family="Fraunces, serif" font-size="28">Leaders, records, and round context</text>
  <rect x="72" y="520" width="1056" height="1" fill="#ffffff" opacity="0.08"/>
  <text x="72" y="566" fill="#79d8d0" font-family="Fraunces, serif" font-size="24">Evidence-first stats - 2008 finals - full seasons from 2009</text>
</svg>
