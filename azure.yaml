name: netballstats
metadata:
  template: netballstats-azure-postgres@0.1.0
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  postdeploy:
    shell: sh
    run: |
      # After deploying the API, sync the refresh job images to match.
      # DB_REFRESH_JOB_SAT_NAME and DB_REFRESH_JOB_SUN_NAME come from
      # Bicep outputs, surfaced as env vars by azd.
      # AZURE_RESOURCE_GROUP is not exported by azd; fall back to the known value.
      RG="${AZURE_RESOURCE_GROUP:-rg-netballstats-audljf}"
      API_IMAGE=$(az rest \
        --method get \
        --url "https://management.azure.com/subscriptions/$AZURE_SUBSCRIPTION_ID/resourceGroups/$RG/providers/Microsoft.App/containerApps?api-version=2024-03-01" \
        --query "value[?tags.\"azd-service-name\"=='api'].properties.template.containers[0].image | [0]" \
        --output tsv)
      az containerapp job update \
        --name "$DB_REFRESH_JOB_SAT_NAME" \
        --resource-group "$RG" \
        --image "$API_IMAGE" \
        --container-name main
      az containerapp job update \
        --name "$DB_REFRESH_JOB_SUN_NAME" \
        --resource-group "$RG" \
        --image "$API_IMAGE" \
        --container-name main
services:
  web:
    project: .
    dist: dist
    language: js
    host: staticwebapp
    module: modules/app-stack
  api:
    project: .
    language: js
    host: containerapp
    module: modules/app-stack
    docker:
      path: ./Dockerfile.azure
      context: .
      registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
      platform: linux/amd64
      remoteBuild: true
    apiVersion: 2025-07-01
