name: netballstats
metadata:
  template: netballstats-azure-postgres@0.1.0
infra:
  provider: bicep
  path: infra
  module: main
services:
  web:
    project: .
    dist: dist
    language: js
    host: staticwebapp
    module: modules/app-stack
  api:
    project: .
    language: js
    host: containerapp
    module: modules/app-stack
    docker:
      path: ./Dockerfile.azure
      context: .
      registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
      platform: linux/amd64
      remoteBuild: true
    apiVersion: 2025-07-01
